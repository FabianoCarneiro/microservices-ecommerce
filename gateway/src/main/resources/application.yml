spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: products-service
          uri: http://localhost:8081
          predicates:
            - Path=/products,/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: products
                fallbackUri: forward:/fallback
        - id: orders-service
          uri: lb://ORDERS-SERVICE
          predicates:
            - Path=/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orders
                fallbackUri: forward:/fallback
        - id: payments-service
          uri: lb://payments-service
          predicates:
            - Path=/payments/**
          filters:
            - name: CircuitBreaker
              args:
                name: payments
                fallbackUri: forward:/fallback

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: WARN
    org.springframework.web: INFO
    org.springframework.cloud.gateway.route: DEBUG